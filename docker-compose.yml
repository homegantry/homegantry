services:
  nginx:
    image: nginx:alpine
    container_name: homegantry-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: homegantry-ui
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homegantry-api
    restart: unless-stopped
    volumes:
      - /home/g/.openclaw/workspace:/workspace:ro
