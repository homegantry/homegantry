services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: homegantry-ui
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homegantry-api
    ports:
      - "8000:8000"
    restart: unless-stopped
